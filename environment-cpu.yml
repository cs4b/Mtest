name: thesis-env
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python and core
  - python=3.11
  - pip
  - setuptools>=61.0
  - setuptools_scm[toml]>=6.2
  
  # ML/Data Science Core
  - numpy
  - scipy
  - scikit-learn
  - pandas
  - matplotlib
  - seaborn
  
  # Chemistry
  - rdkit
  - networkx
  
  # CPU-only PyTorch (Windows, Mac, Linux compatible)
  - pytorch
  - cpuonly
  
  # Other tools
  - pyyaml
  - tqdm
  - pytest
  
  - pip:
    # Additional pip dependencies
    - charset-normalizer
    - deepsmiles
    - selfies
    - #PyTDC #did not work with CPU-only PyTorch, so commented out for now
    - nltk
    - guacamol
    - pandas-stubs
    - joblib
    - gitpython
    - requests
    - jupyterlab
    - mols2grid

# Notes:
# - CPU-only version (works on Windows, Mac, Linux)
# - Use this if you don't have NVIDIA GPU or CUDA installed
# - Slower than GPU but fully functional for testing
# - CPU-only version for systems without CUDA GPU
# - This environment combines requirements from diverse-hits and DrugEx
# - Use: conda env create -f environment-cpu.yml
