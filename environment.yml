name: thesis-env
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python and core
  - python=3.11
  - pip
  - setuptools>=61.0
  - setuptools_scm[toml]>=6.2
  
  # ML/Data Science Core
  - numpy
  - scipy
  - scikit-learn
  - pandas
  - matplotlib
  - seaborn
  
  # Chemistry
  - rdkit
  - networkx
  
  # GPU/Computation (CUDA 11.8+)
  - pytorch
  - pytorch-cuda=11.8
  - dgl
  
  # Other tools
  - pyyaml
  - tqdm
  - pytest
  
  - pip:
    # Additional pip dependencies
    - charset-normalizer
    - deepsmiles
    - selfies
    - PyTDC
    - nltk
    - guacamol
    - pandas-stubs
    - joblib
    - gitpython
    - requests
    - jupyterlab
    - mols2grid

# Notes:
# - GPU version requires CUDA 11.8 compatible NVIDIA GPU
# - Linux and Mac only (CUDA not well-supported on Windows)
# - For Windows or CPU-only, use environment-cpu.yml instead
